  nameserver:
    - "https://doh.pub/dns-query"
    - "https://dns.alidns.com/dns-query"

proxy-providers:
  机场订阅:
    type: http
    url: "https://pics9.sknil-gnikiv.com/wx5TqEUTwXks/v1/w7LQhnaSTnjD/VikingLinks?token=b5918d82bc76ef59051239cdb4617817.140z6dkry5c.jpg"
    path: ./proxy_providers/airport.yaml
    interval: 3600
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
      timeout: 5000
      lazy: true
      expected-status: 204
    override:
      udp: true
      client-fingerprint: chrome

proxy-groups:
  - name: "🚀 节点选择"
    type: select
    proxies:
      - "🇭🇰 香港节点"
      - "🇨🇳 台湾节点"
      - "🇸🇬 狮城节点"
      - "🇯🇵 日本节点"
      - "🇺🇲 美国节点"
      - "DIRECT"
    use:
      - 机场订阅

  - name: "🇭🇰 香港节点"
    type: select
    use:
      - 机场订阅
    filter: "(港|HK|hk|Hong Kong|HongKong|hongkong)"

  - name: "🇨🇳 台湾节点"
    type: select
    use:
      - 机场订阅
    filter: "(台|新北|彰化|TW|Taiwan)"

  - name: "🇸🇬 狮城节点"
